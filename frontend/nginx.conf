server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ----------------------------------------------------------
    # Vite pre-compresses every bundle at build time to .gz (and .br). Prefer
    # serving the precomputed file to save CPU. Fall back to on-the-fly gzip
    # for dynamic responses and anything the build step did not precompress.
    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/event-stream
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        font/otf
        font/ttf
        image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Brotli static is available only if the nginx image bundles the brotli
    # module. Stock nginx:alpine does not. If you switch to an image that
    # includes ngx_brotli (e.g. ranchermanager/nginx-brotli), uncomment:
    # brotli_static on;
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # --- Security headers -----------------------------------------------------
    # X-XSS-Protection is intentionally omitted (deprecated, replaced by CSP).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # HSTS (effective behind HTTPS only — safe to ship regardless, browsers
    # only honour it on TLS requests). Preload eligible.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy
    # NOTE: Mantine injects stylesheet blobs, so style-src must include 'unsafe-inline'.
    # 'unsafe-eval' is omitted — Mantine 8 + React 19 + Vite production build do not need it.
    # If you load assets from additional CDNs, add them here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'; upgrade-insecure-requests" always;

    # --- MIME / charset -------------------------------------------------------
    charset utf-8;
    types {
        application/manifest+json  webmanifest;
    }

    # --- Static assets (long cache, immutable) --------------------------------
    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:png|jpe?g|gif|ico|svg|webp|avif)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # --- Service worker + manifest: never long-cache --------------------------
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # --- SPA fallback ---------------------------------------------------------
    location / {
        # index.html must not be cached aggressively so deploys roll out fast.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # --- Health check ---------------------------------------------------------
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # --- Hardening ------------------------------------------------------------
    # Block hidden/version control files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Disable server tokens
    server_tokens off;
}
