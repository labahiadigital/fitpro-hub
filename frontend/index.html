<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover keeps safe-area insets on notched devices.
         maximum-scale was removed on purpose: blocking user zoom fails WCAG 1.4.4. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">

    <title>Trackfiz</title>
    <meta name="description" content="Trackfiz - Plataforma CRM/ERP/LMS para profesionales del fitness y bienestar">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">

    <meta name="theme-color" content="#F2F4EF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b0d0a" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Trackfiz">
    <meta name="format-detection" content="telephone=no">

    <!-- Resource hints: open connections to Google Fonts early so CSS/WOFF arrive faster. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">

    <!-- Initial app chunk: hint the browser to start fetching before JS parse. -->
    <link rel="modulepreload" href="/src/main.tsx" as="script">

    <style>
      /* Paint a neutral background immediately so there's no white flash
         before Mantine hydrates its theme. */
      html, body { margin: 0; background: #F2F4EF; color: #1a1a1a; }
      @media (prefers-color-scheme: dark) {
        html, body { background: #0b0d0a; color: #eceae4; }
      }
      #root { min-height: 100dvh; min-height: 100vh; }
      /* Respect users who opted out of motion. */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <p style="padding:2rem;font-family:system-ui,sans-serif">
        Trackfiz necesita JavaScript para funcionar. Activa JavaScript en tu navegador y recarga la página.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
